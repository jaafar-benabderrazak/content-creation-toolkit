sdxl:
  negative_prompt: oversaturated, cartoon, anime, low quality, blurry, soft focus,
    bright daylight, flat lighting, digital artifacts, overexposed
  positive_prompt: Cinematic wide shot of secret underground server room, towering
    racks of humming computers bathed in electric blue LED light, thick bundles of
    cables snaking across concrete floors, dramatic chiaroscuro lighting cutting through
    industrial haze, warm golden hour sunlight filtering through hidden ventilation
    shafts, shallow depth of field isolating foreground servers, 35mm film grain texture,
    high contrast shadows, cyberpunk aesthetic, premium production quality
  scene_templates:
  - Underground data center establishing shot, endless rows of server towers stretching
    into darkness, blue status lights creating geometric patterns, warm golden shafts
    piercing through concrete ceiling, 35mm cinematic composition
  - Close-up rack focus pull from foreground cables to background servers, electric
    blue glow illuminating dust particles in air, dramatic side lighting, high contrast
    film photography aesthetic
  - Low angle wide shot looking up server corridor, towering metal racks creating
    canyon effect, scattered warm light pools, cyberpunk atmosphere with heavy shadows
    and industrial textures
  - Overhead drone-like shot of server floor maze, geometric cable routing patterns,
    blue LED strips creating neon grid, golden hour light streaming through hidden
    access points
  - Intimate medium shot of single server rack, focused shallow depth with bokeh background
    lights, warm rim lighting contrasting cool blue electronics, film grain texture
    throughout
  - Sweeping lateral tracking shot down server aisle, motion blur on background equipment,
    sharp foreground detail, moody atmospheric lighting mixing warm and cool tones,
    cinematic framing
  - Secret entrance reveal shot, heavy industrial door opening to blue-lit server
    cavern, dramatic backlighting silhouette, high contrast between dark entry and
    bright interior technology
  - Underground tunnel perspective with servers lining curved walls, vanishing point
    composition, alternating warm and blue lighting zones, 35mm wide angle distortion,
    premium production quality

sdxl:
  negative_prompt: low quality, blurry, oversaturated, cartoon, anime, poorly lit,
    flat lighting, digital noise, overexposed, underexposed, amateur photography,
    harsh shadows, unrealistic colors
  positive_prompt: Cinematic wide shot of a neon-lit cyberpunk study room at night,
    rain streaking down massive windows, warm golden hour glow mixing with electric
    blue and pink neon signs from the street below, dramatic lighting casting long
    shadows across vintage wooden desk with scattered books and glowing screens, shallow
    depth of field blurring the distant cityscape, shot on 35mm film with rich grain
    texture, high contrast premium production aesthetic, moody atmospheric lighting
    creating perfect studying ambiance
  scene_templates:
  - Close-up of rain droplets on window glass with soft neon reflections, warm desk
    lamp illuminating open textbook pages, 35mm film grain, shallow focus on raindrops
    while books blur in background, golden hour mixed with cool neon tones
  - Wide establishing shot of towering cyberpunk cityscape at night, rain falling
    heavily, warm light spilling from study room window high in skyscraper, dramatic
    contrast between cozy interior and harsh urban environment outside
  - Medium shot of hands turning book pages under warm desk lamp, neon signs casting
    colored shadows across wooden surface, rain pattering against nearby window, film
    photography aesthetic with rich contrast and vintage grain texture
  - Overhead angle of cluttered study desk bathed in golden lamplight, neon reflections
    dancing on wet window behind, scattered notebooks and pens, coffee mug steaming,
    rain creating abstract light patterns on glass surface
  - Profile silhouette of figure studying at window desk, dramatic side lighting from
    warm lamp mixing with cool neon glow from street, rain creating bokeh effects
    on glass, high contrast cinematic composition with deep shadows
  - Wide shot through rain-soaked window looking into cozy study nook, warm golden
    interior light contrasting with cold blue neon cityscape, books and papers visible
    on desk, atmospheric depth with layered lighting and film grain
  - Detail shot of vintage desk lamp casting warm pool of light on open journal, neon
    signs reflecting in raindrops on nearby window, shallow depth of field isolating
    the writing area, premium film photography with rich textures
  - Cinematic angle of study room corner where warm lamplight meets cool neon window
    light, rain streaking glass creates dynamic patterns, books stacked on wooden
    desk, moody atmospheric lighting with high contrast and 35mm aesthetic
suno:
  genre: orchestral cinematic
